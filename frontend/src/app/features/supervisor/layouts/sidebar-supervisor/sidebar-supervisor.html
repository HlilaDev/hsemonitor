<div class="sidebar">
  <a class="brand" [routerLink]="brand.homeLink">
    <img [src]="brand.logoSrc" [alt]="brand.title" />
    <div class="brand-text">
      <span class="title">
        {{ brand.title }} <span class="accent">{{ brand.accent }}</span>
      </span>
      <span class="subtitle">{{ brand.subtitle }}</span>
    </div>
  </a>

  <div class="sections">
    @for (section of sections; track section.titleKey) {
      <div class="section">
        <div class="section-title">
          {{ section.titleKey | translate }}
        </div>

        <nav class="menu">
          @for (item of section.items; track item.route) {
            <a
              class="menu-item"
              [routerLink]="item.route"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
            >
              <i [class]="item.icon"></i>
              <span>{{ item.labelKey | translate }}</span>
            </a>
          }
        </nav>
      </div>
    }
  </div>
</div>
